name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libncurses-dev mandoc

      - name: Build (CLI)
        run: make clean && make

      - name: Build (TUI)
        run: make clean && make TUI=1

      - name: Selftest
        run: ./basidium --selftest

      - name: Dry-run smoke test
        run: ./basidium --dry-run -M arp -n 100

      - name: Version check
        run: ./basidium --version

      - name: Scenario dry-run
        run: ./basidium --dry-run --scenario examples/ci-smoke.tco

      - name: Validate all example scenarios
        run: for f in examples/*.tco; do ./basidium --validate "$f" || exit 1; done

      - name: Manpage lint
        run: mandoc -Tlint basidium.8 || true

  exhaustive-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev python3

      - name: Build
        run: make clean && make

      - name: Exhaustive offline test suite (~120 assertions)
        run: make test

  sanitizers:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build with ASan + UBSan
        run: make clean && make asan

      - name: Selftest under sanitizers
        run: ./basidium --selftest

      - name: Dry-run scenario under sanitizers
        run: ./basidium --dry-run --scenario examples/ci-smoke.tco

      - name: Diff smoke under sanitizers
        run: |
          ./basidium --dry-run -M arp -n 1024 \
            --report=/tmp/a.json --scenario examples/ci-smoke.tco
          cp /tmp/a.json /tmp/b.json
          ./basidium --diff /tmp/a.json /tmp/b.json

  tsan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev

      - name: Build with TSan
        run: make clean && make tsan

      - name: Selftest under TSan
        run: ./basidium --selftest

      - name: Scenario dry-run under TSan
        run: ./basidium --dry-run --scenario examples/ci-smoke.tco

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (CLI)
        run: make clean && make

      - name: Build (TUI)
        run: make clean && make TUI=1

      - name: Selftest
        run: ./basidium --selftest

      - name: Dry-run smoke test
        run: ./basidium --dry-run -M arp -n 100

      - name: Version check
        run: ./basidium --version

      - name: Scenario dry-run
        run: ./basidium --dry-run --scenario examples/ci-smoke.tco

      - name: Validate all example scenarios
        run: for f in examples/*.tco; do ./basidium --validate "$f" || exit 1; done
