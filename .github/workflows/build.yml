name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libpcap-dev libncurses-dev

      - name: Build (CLI)
        run: make clean && make

      - name: Build (TUI)
        run: make clean && make TUI=1

      - name: Selftest
        run: ./basidium --selftest

      - name: Dry-run smoke test
        run: ./basidium --dry-run -M arp -n 100

      - name: Version check
        run: ./basidium --version

      - name: Scenario dry-run
        run: ./basidium --dry-run --scenario examples/ci-smoke.tco

  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build (CLI)
        run: make clean && make

      - name: Build (TUI)
        run: make clean && make TUI=1

      - name: Selftest
        run: ./basidium --selftest

      - name: Dry-run smoke test
        run: ./basidium --dry-run -M arp -n 100

      - name: Version check
        run: ./basidium --version

      - name: Scenario dry-run
        run: ./basidium --dry-run --scenario examples/ci-smoke.tco
